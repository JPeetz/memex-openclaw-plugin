# @memex/openclaw-memex Plugin Manifest

kind: context-engine
name: MeMex Zero RAG
description: Durable, anti-hallucination wiki memory for OpenClaw agents
version: 0.1.0
minGatewayVersion: "2026.5.28"

slots:
  contextEngine: memex-openclaw

hooks:
  contextEngine:
    - bootstrap
    - ingest
    - assemble
    - compact
    - afterTurn
    - prepareSubagent
    - onSubagentEnded

skills:
  - memex-search

secrets: []

config:
  wikiPath:
    type: string
    default: "~/workspace/MeMex-Zero-RAG/wiki/"
    description: Path to the MeMex Zero RAG wiki directory

  maxInjectEntries:
    type: number
    default: 5
    min: 1
    max: 20
    description: Max wiki entries to inject per assembly

  searchMode:
    type: enum
    values: ["keyword", "semantic", "hybrid"]
    default: "keyword"
    description: Wiki search mode

  respectDecayDates:
    type: boolean
    default: true
    description: Whether to respect knowledge decay dates

  enableConflictDetection:
    type: boolean
    default: true
    description: Enable conflict detection on bootstrap

  verbose:
    type: boolean
    default: false
    description: Verbose logging